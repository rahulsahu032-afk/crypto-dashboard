<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crypto Broker Scanner</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:20px
}
h1{text-align:center}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px
}
th,td{
    padding:10px;
    border-bottom:1px solid #1e293b;
    text-align:center
}
tr:hover{
    background:#1e293b;
    cursor:pointer
}
.green{color:#22c55e}
.red{color:#ef4444}
button,select{
    padding:8px 15px;
    margin:5px;
    background:#2563eb;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:5px
}
.controls{
    text-align:center;
    margin-top:15px
}
</style>
</head>

<body>

<h1>Crypto Momentum Scanner</h1>

<div class="controls">

<select id="broker" onchange="loadData('desc')">
<option value="binance">Binance</option>
<option value="coindcx">CoinDCX</option>
</select>

<button onclick="loadData('desc')">Top Gainers</button>
<button onclick="loadData('asc')">Top Losers</button>

</div>

<table>
<thead>
<tr>
<th>Rank</th>
<th>Pair</th>
<th>24h %</th>
<th>Volume</th>
</tr>
</thead>
<tbody id="cryptoTable"></tbody>
</table>

<script>

let globalData = [];
let currentOrder = "desc";

async function loadData(order){

currentOrder = order;
const broker = document.getElementById("broker").value;

try {

if(broker === "binance"){

    const response = await fetch("https://api.binance.com/api/v3/ticker/24hr");
    const data = await response.json();

    globalData = data
        .filter(c => c.symbol.endsWith("USDT"))
        .map(c => ({
            symbol: c.symbol,
            percent: parseFloat(c.priceChangePercent),
            volume: parseFloat(c.quoteVolume)
        }));
}

if(broker === "coindcx"){

    const proxy = "https://api.codetabs.com/v1/proxy?quest=";
    const url = "https://public.coindcx.com/market_data/ticker";

    const response = await fetch(proxy + url);
    const data = await response.json();

    globalData = data
        .filter(c => c.market.includes("USDT"))
        .map(c => ({
            symbol: c.market.replace("_","").toUpperCase(),
            percent: parseFloat(c.change_24_hour),
            volume: parseFloat(c.volume)
        }));
}

globalData.sort((a,b)=>order==="desc"
?b.percent - a.percent
:a.percent - b.percent);

globalData = globalData.slice(0,100);

renderTable();

} catch(error){
    console.log("Error:", error);
}

}

function renderTable(){

const table=document.getElementById("cryptoTable");
table.innerHTML="";

globalData.forEach((coin,index)=>{

const row=document.createElement("tr");

row.onclick=()=>{
window.open("https://www.tradingview.com/chart/?symbol="+coin.symbol,"_blank");
};

row.innerHTML=`
<td>${index+1}</td>
<td>${coin.symbol}</td>
<td class="${coin.percent>=0?'green':'red'}">
${coin.percent.toFixed(2)}%
</td>
<td>${coin.volume.toLocaleString()}</td>
`;

table.appendChild(row);

});
}

loadData("desc");
setInterval(()=>loadData(currentOrder),60000);

</script>

</body>
</html>
