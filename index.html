<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crypto Scanner</title>
<style>
body{background:#0f172a;color:white;font-family:Arial;padding:20px}
h1{text-align:center}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{padding:10px;border-bottom:1px solid #1e293b}
tr:hover{background:#1e293b;cursor:pointer}
.green{color:#22c55e}
.red{color:#ef4444}
button{padding:8px 15px;margin:5px;background:#2563eb;border:none;color:white;cursor:pointer}
</style>
</head>
<body>

<h1>Crypto Trend Dashboard</h1>

<div style="text-align:center;">
<button onclick="loadData('desc')">Top Gainers</button>
<button onclick="loadData('asc')">Top Losers</button>
</div>

<table>
<thead>
<tr>
<th>Rank</th>
<th>Pair</th>
<th>24h %</th>
<th>Volume</th>
</tr>
</thead>
<tbody id="cryptoTable"></tbody>
</table>

<script>
async function loadData(order){

const response = await fetch("https://api.binance.com/api/v3/ticker/24hr");
const data = await response.json();

// filter only USDT pairs
const usdtPairs = data.filter(c => c.symbol.endsWith("USDT"));

// sort
usdtPairs.sort((a,b)=>order==="desc"
?parseFloat(b.priceChangePercent)-parseFloat(a.priceChangePercent)
:parseFloat(a.priceChangePercent)-parseFloat(b.priceChangePercent));

const table=document.getElementById("cryptoTable");
table.innerHTML="";

usdtPairs.slice(0,100).forEach((coin,index)=>{
const row=document.createElement("tr");

row.onclick=()=>{
window.open("https://www.tradingview.com/chart/?symbol=BINANCE:"+coin.symbol,"_blank");
};

row.innerHTML=`
<td>${index+1}</td>
<td>${coin.symbol}</td>
<td class="${parseFloat(coin.priceChangePercent)>=0?'green':'red'}">
${parseFloat(coin.priceChangePercent).toFixed(2)}%
</td>
<td>${parseFloat(coin.quoteVolume).toLocaleString()}</td>
`;

table.appendChild(row);
});
}

loadData("desc");
setInterval(()=>loadData("desc"),60000);
</script>

</body>
</html>
