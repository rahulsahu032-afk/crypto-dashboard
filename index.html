<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crypto Scanner</title>
<style>
body{background:#0f172a;color:white;font-family:Arial;padding:20px}
h1{text-align:center}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{padding:10px;border-bottom:1px solid #1e293b}
tr:hover{background:#1e293b;cursor:pointer}
.green{color:#22c55e}
.red{color:#ef4444}
button{padding:8px 15px;margin:5px;background:#2563eb;border:none;color:white;cursor:pointer}
</style>
</head>
<body>

<h1>Crypto Trend Dashboard</h1>

<div style="text-align:center;">
<button onclick="loadData('desc')">Top Gainers</button>
<button onclick="loadData('asc')">Top Losers</button>
</div>

<table>
<thead>
<tr>
<th>Rank</th>
<th>Coin</th>
<th>Price</th>
<th>24h %</th>
<th>Volume</th>
</tr>
</thead>
<tbody id="cryptoTable"></tbody>
</table>

<script>
async function loadData(order){

const proxy = "https://api.allorigins.win/raw?url=";
const apiURL = encodeURIComponent("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usdt&order=market_cap_desc&per_page=250&page=1");

const response = await fetch(proxy + apiURL);
const data = await response.json();

data.sort((a,b)=>order==="desc"
?b.price_change_percentage_24h-a.price_change_percentage_24h
:a.price_change_percentage_24h-b.price_change_percentage_24h);

const table=document.getElementById("cryptoTable");
table.innerHTML="";

data.slice(0,100).forEach((coin,index)=>{
const row=document.createElement("tr");

row.onclick=()=>{
window.open("https://www.tradingview.com/chart/?symbol="+coin.symbol.toUpperCase()+"USDT","_blank");
};

row.innerHTML=`
<td>${index+1}</td>
<td>${coin.symbol.toUpperCase()}</td>
<td>$${coin.current_price}</td>
<td class="${coin.price_change_percentage_24h>=0?'green':'red'}">
${coin.price_change_percentage_24h.toFixed(2)}%
</td>
<td>$${coin.total_volume.toLocaleString()}</td>
`;

table.appendChild(row);
});
}

loadData("desc");
setInterval(()=>loadData("desc"),60000);
</script>

</body>
</html>
