<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crypto Trend Dashboard</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:20px
}
h1{text-align:center}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px
}
th,td{
    padding:10px;
    border-bottom:1px solid #1e293b;
    text-align:center
}
tr:hover{
    background:#1e293b;
    cursor:pointer
}
.green{color:#22c55e}
.red{color:#ef4444}
button{
    padding:8px 15px;
    margin:5px;
    background:#2563eb;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:5px
}
input{
    padding:6px;
    width:70px;
    border-radius:5px;
    border:none;
    text-align:center
}
.controls{
    text-align:center;
    margin-top:15px
}
</style>

</head>
<body>

<h1>Crypto Futures Trend Dashboard</h1>

<div class="controls">
<button onclick="loadData('desc')">Top Gainers</button>
<button onclick="loadData('asc')">Top Losers</button>
<br><br>
Minimum % Move:
<input type="number" id="minMove" value="5">
<button onclick="applyFilter()">Apply Filter</button>
</div>

<table>
<thead>
<tr>
<th>Rank</th>
<th>Pair</th>
<th>24h %</th>
<th>Volume (USDT)</th>
</tr>
</thead>
<tbody id="cryptoTable"></tbody>
</table>

<script>

let globalData = [];

async function loadData(order){

const response = await fetch("https://api.binance.com/api/v3/ticker/24hr");
const data = await response.json();

// only USDT pairs
let filtered = data.filter(c => c.symbol.endsWith("USDT"));

// sort by % change
filtered.sort((a,b)=>order==="desc"
?parseFloat(b.priceChangePercent)-parseFloat(a.priceChangePercent)
:parseFloat(a.priceChangePercent)-parseFloat(b.priceChangePercent));

globalData = filtered.slice(0,100);

renderTable();
}

function renderTable(){

const table=document.getElementById("cryptoTable");
table.innerHTML="";

let minMove = parseFloat(document.getElementById("minMove").value) || 0;

globalData.forEach((coin,index)=>{

let percent = parseFloat(coin.priceChangePercent);

if(Math.abs(percent) < minMove) return;

const row=document.createElement("tr");

row.onclick=()=>{
window.open("https://www.tradingview.com/chart/?symbol="+coin.symbol,"_blank");
};

row.innerHTML=`
<td>${index+1}</td>
<td>${coin.symbol}</td>
<td class="${percent>=0?'green':'red'}">
${percent.toFixed(2)}%
</td>
<td>${parseFloat(coin.quoteVolume).toLocaleString()}</td>
`;

table.appendChild(row);

});
}

function applyFilter(){
renderTable();
}

// load initially
loadData("desc");

// auto refresh every 60 seconds
setInterval(()=>loadData("desc"),60000);

</script>

</body>
</html>
