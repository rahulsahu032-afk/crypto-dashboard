<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Futures Momentum Scanner</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:20px
}
h1{text-align:center}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px
}
th,td{
    padding:10px;
    border-bottom:1px solid #1e293b;
    text-align:center
}
tr:hover{
    background:#1e293b;
    cursor:pointer
}
.green{color:#22c55e}
.red{color:#ef4444}
button{
    padding:8px 15px;
    margin:5px;
    background:#2563eb;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:5px
}
input{
    padding:6px;
    width:80px;
    border-radius:5px;
    border:none;
    text-align:center
}
.controls{
    text-align:center;
    margin-top:15px
}
</style>
</head>

<body>

<h1>USDT Futures Momentum Scanner</h1>

<div class="controls">
<button onclick="loadData('desc')">Top Gainers</button>
<button onclick="loadData('asc')">Top Losers</button>
<br><br>
Min % Move:
<input type="number" id="minMove" value="5">
Min Volume (M USDT):
<input type="number" id="minVol" value="50">
<button onclick="renderTable()">Apply Filters</button>
</div>

<table>
<thead>
<tr>
<th>Rank</th>
<th>Pair</th>
<th>24h %</th>
<th>Volume (USDT)</th>
</tr>
</thead>
<tbody id="cryptoTable"></tbody>
</table>

<script>

let globalData = [];
let currentOrder = "desc";

async function loadData(order){

currentOrder = order;

// Binance Futures API (USDT Perpetual)
const response = await fetch("https://fapi.binance.com/fapi/v1/ticker/24hr");
const data = await response.json();

// only USDT perpetual contracts
let filtered = data.filter(c => c.symbol.endsWith("USDT"));

filtered.sort((a,b)=>order==="desc"
?parseFloat(b.priceChangePercent)-parseFloat(a.priceChangePercent)
:parseFloat(a.priceChangePercent)-parseFloat(b.priceChangePercent));

globalData = filtered.slice(0,100);

renderTable();
}

function renderTable(){

const table=document.getElementById("cryptoTable");
table.innerHTML="";

let minMove = parseFloat(document.getElementById("minMove").value) || 0;
let minVol = (parseFloat(document.getElementById("minVol").value) || 0) * 1000000;

let rank = 1;

globalData.forEach((coin)=>{

let percent = parseFloat(coin.priceChangePercent);
let volume = parseFloat(coin.quoteVolume);

if(Math.abs(percent) < minMove) return;
if(volume < minVol) return;

const row=document.createElement("tr");

row.onclick=()=>{
window.open("https://www.tradingview.com/chart/?symbol="+coin.symbol,"_blank");
};

row.innerHTML=`
<td>${rank++}</td>
<td>${coin.symbol}</td>
<td class="${percent>=0?'green':'red'}">
${percent.toFixed(2)}%
</td>
<td>${(volume/1000000).toFixed(1)} M</td>
`;

table.appendChild(row);

});
}

// initial load
loadData("desc");

// auto refresh every 60 sec
setInterval(()=>loadData(currentOrder),60000);

</script>

</body>
</html>
