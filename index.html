<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CoinDCX Futures Scanner</title>
<style>
body{background:#0f172a;color:white;font-family:Arial;padding:20px}
h1{text-align:center}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{padding:10px;border-bottom:1px solid #1e293b}
tr:hover{background:#1e293b;cursor:pointer}
.green{color:#22c55e}
.red{color:#ef4444}
button{padding:8px 15px;margin:5px;background:#2563eb;border:none;color:white;cursor:pointer}
</style>
</head>
<body>

<h1>CoinDCX USDT Futures Dashboard</h1>

<div style="text-align:center;">
<button onclick="loadData('desc')">Top Gainers</button>
<button onclick="loadData('asc')">Top Losers</button>
</div>

<table>
<thead>
<tr>
<th>Rank</th>
<th>Pair</th>
<th>24h %</th>
<th>Last Price</th>
<th>Volume</th>
</tr>
</thead>
<tbody id="cryptoTable"></tbody>
</table>

<script>
async function loadData(order){

const response = await fetch("https://public.coindcx.com/market_data/ticker");
const data = await response.json();

// filter only USDT perpetual futures
const futuresPairs = data.filter(c =>
c.market.includes("USDT") &&
c.market.includes("PERP")
);

// sort
futuresPairs.sort((a,b)=>order==="desc"
?parseFloat(b.change_24_hour)-parseFloat(a.change_24_hour)
:parseFloat(a.change_24_hour)-parseFloat(b.change_24_hour));

const table=document.getElementById("cryptoTable");
table.innerHTML="";

futuresPairs.slice(0,100).forEach((coin,index)=>{
const row=document.createElement("tr");

row.onclick=()=>{
window.open("https://www.tradingview.com/chart/?symbol=COINDCX:"+coin.market,"_blank");
};

row.innerHTML=`
<td>${index+1}</td>
<td>${coin.market}</td>
<td class="${parseFloat(coin.change_24_hour)>=0?'green':'red'}">
${parseFloat(coin.change_24_hour).toFixed(2)}%
</td>
<td>${coin.last_price}</td>
<td>${parseFloat(coin.volume).toLocaleString()}</td>
`;

table.appendChild(row);
});
}

loadData("desc");
setInterval(()=>loadData("desc"),60000);
</script>

</body>
</html>
